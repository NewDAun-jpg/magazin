{% extends 'products/base.html' %}

{% block title %}Регистрация - Мой магазин{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Регистрация</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}  <!-- предполагается, что передаётся форма регистрации -->
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
            <p class="mt-3">Уже есть аккаунт? <a href="{% url 'core:login_view' %}">Войдите</a></p>
        </div>
    </div>
{% endblock %}
